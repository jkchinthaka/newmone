        value: simple-qr-code-generator-cheap-and-efficient.p.rapidapi.com
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FARM_DEFAULT_LATITUDE
        value: "6.9271"
      - key: FARM_DEFAULT_LONGITUDE
        value: "79.8612"
      - key: WEATHER_ALERT_FROST_THRESHOLD_C
        value: "5"
      - key: WEATHER_ALERT_RAIN_THRESHOLD_MM
        value: "50"
      - key: APP_VERSION
        value: "1.2.0"
