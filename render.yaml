# If your database/provider requires source IP allowlists, include these
# Render outbound CIDRs for this backend environment:
# - 74.220.49.0/24
# - 74.220.57.0/24
services:
  - type: web
    name: maintainpro-api
    runtime: node
    rootDir: maintainpro
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRIMARY_DATABASE_URL
        sync: false
      - key: BACKUP_DATABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_PROVIDER
        value: mongodb
      - key: PRIMARY_DATABASE_NAME
        value: maintainpro_staging
      - key: BACKUP_DATABASE_NAME
        value: bileeta_db
      - key: DATABASE_SERVER_SELECTION_TIMEOUT_MS
        value: "5000"
      - key: DATABASE_CONNECT_TIMEOUT_MS
        value: "5000"
      - key: MONGO_DATABASE_NAME
        value: maintainpro_staging
      - key: MONGODB_URI
        sync: false
      - key: MONGO_SYNC_ON_STARTUP
        value: "false"
      - key: DATABASE_REPLICATION_ENABLED
        value: "true"
      - key: DATABASE_REPLICATION_MODE
        value: async_outbox
      - key: DATABASE_REPLICATION_RETRY_ATTEMPTS
        value: "5"
      - key: DATABASE_REPLICATION_RETRY_DELAY_MS
        value: "5000"
      - key: DATABASE_REPLICATION_BATCH_SIZE
        value: "100"
      - key: BACKUP_DATABASE_REQUIRED_FOR_READINESS
        value: "false"
      - key: BACKUP_DATABASE_REQUIRED_FOR_STRICT_MODE
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: CORS_ORIGIN
        value: https://newmone.chinthakajayaweera1.workers.dev
      - key: FRONTEND_URL
        value: https://newmone.chinthakajayaweera1.workers.dev
      - key: REDIS_URL
        sync: false
      - key: REDIS_REQUIRED_IN_PRODUCTION
        value: "false"
      - key: REDIS_REQUIRED_FOR_READINESS
        value: "false"
      - key: OBJECT_STORAGE_REQUIRED_FOR_READINESS
        value: "false"
      - key: MAINTAINPRO_SEED_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_ASSET_FOLDER
        value: maintainpro/asset-documents
      - key: SMTP_HOST
        sync: false
      - key: SMTP_ENABLED
        value: "false"
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SMS_ENABLED
        value: "false"
      - key: SMS_API_URL
        sync: false
      - key: SMS_API_KEY
        sync: false
      - key: SMS_API_SECRET
        sync: false
      - key: SMS_AUTH_HEADER
        value: Authorization
      - key: SMS_SENDER_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ERP_SYNC_PROVIDER
        value: mock
      - key: ERP_SYNC_ALLOW_MOCK_IN_PRODUCTION
        value: "false"
      - key: ERP_SYNC_REQUIRED_FOR_READINESS
        value: "false"
      - key: ERP_PROVIDER_ID
        sync: false
      - key: ERP_API_URL
        sync: false
      - key: ERP_API_KEY
        sync: false
      - key: ERP_AUTH_HEADER
        value: Authorization
      - key: ERP_TIMEOUT_MS
        value: "15000"
      - key: PUSH_PROVIDER
        value: noop
      - key: PUSH_PROVIDER_ENABLED
        value: "false"
      - key: PUSH_PROVIDER_API_URL
        sync: false
      - key: PUSH_PROVIDER_API_KEY
        sync: false
      - key: PUSH_PROVIDER_AUTH_HEADER
        value: Authorization
      - key: RAPIDAPI_GOOGLE_MAP_PLACES_KEY
