<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MongoDB Sync Dashboard</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --ink: #172133;
        --muted: #6b778d;
        --live: #1f8f4e;
        --error: #c73a3a;
        --syncing: #d98b00;
        --line: #dfe4ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 10%, #ffffff 0%, transparent 45%),
          radial-gradient(circle at 85% 90%, #e6ecff 0%, transparent 40%),
          var(--bg);
      }

      .container {
        width: min(980px, 92%);
        margin: 24px auto;
        display: grid;
        gap: 16px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .title {
        margin: 0;
        font-size: 1.45rem;
      }

      .badge {
        border-radius: 999px;
        padding: 6px 12px;
        color: #fff;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .badge.live {
        background: var(--live);
      }

      .badge.error {
        background: var(--error);
      }

      .badge.syncing {
        background: var(--syncing);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
      }

      .stat {
        background: #f9fbff;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
      }

      .stat-label {
        display: block;
        color: var(--muted);
        margin-bottom: 6px;
        font-size: 0.85rem;
      }

      .stat-value {
        font-size: 1.15rem;
        font-weight: 700;
      }

      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        background: #0b5bd3;
        color: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .muted {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .log-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .log-item {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fcfdff;
      }

      .log-meta {
        color: var(--muted);
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="panel header">
        <h1 class="title">Real-Time MongoDB Sync Dashboard</h1>
        <span id="statusBadge" class="badge syncing">Syncing</span>
      </section>

      <section class="panel stats">
        <article class="stat">
          <span class="stat-label">Total Documents Synced</span>
          <strong id="totalSynced" class="stat-value">0</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Last Synced At</span>
          <strong id="lastSyncedAt" class="stat-value">Never</strong>
        </article>
        <article class="stat">
          <span class="stat-label">Pending Errors</span>
          <strong id="pendingErrors" class="stat-value">0</strong>
        </article>
      </section>

      <section class="panel controls">
        <button id="forceResyncBtn" type="button">Force Re-Sync</button>
        <span id="refreshHint" class="muted">Auto-refresh every 10 seconds</span>
      </section>

      <section class="panel">
        <h2>Recent Sync Activity</h2>
        <ul id="activityLog" class="log-list"></ul>
      </section>
    </main>

    <script>
      const statusBadge = document.getElementById("statusBadge");
      const totalSynced = document.getElementById("totalSynced");
      const lastSyncedAt = document.getElementById("lastSyncedAt");
      const pendingErrors = document.getElementById("pendingErrors");
      const activityLog = document.getElementById("activityLog");
      const forceResyncBtn = document.getElementById("forceResyncBtn");
      const refreshHint = document.getElementById("refreshHint");

      /**
       * Update status badge style and text.
       * @param {string} status
       */
      function renderStatusBadge(status) {
        try {
          const normalized = (status || "syncing").toLowerCase();
          statusBadge.className = `badge ${normalized}`;
          if (normalized === "live") {
            statusBadge.textContent = "Live";
            return;
          }
          if (normalized === "error") {
            statusBadge.textContent = "Error";
            return;
          }
          statusBadge.textContent = "Syncing";
        } catch (error) {
          statusBadge.className = "badge error";
          statusBadge.textContent = "Error";
        }
      }

      /**
       * Render recent activity list.
       * @param {Array<{at:string,type:string,message:string}>} events
       */
      function renderActivity(events) {
        try {
          activityLog.innerHTML = "";
          if (!Array.isArray(events) || events.length === 0) {
            const empty = document.createElement("li");
            empty.className = "log-item";
            empty.textContent = "No sync activity yet.";
            activityLog.appendChild(empty);
            return;
          }

          events.slice(0, 10).forEach((event) => {
            const item = document.createElement("li");
            item.className = "log-item";

            const message = document.createElement("div");
            message.textContent = event.message || "Unknown event";

            const meta = document.createElement("div");
            meta.className = "log-meta";
            meta.textContent = `${event.type || "event"} | ${new Date(event.at).toLocaleString()}`;

            item.appendChild(message);
            item.appendChild(meta);
            activityLog.appendChild(item);
          });
        } catch (error) {
          activityLog.innerHTML = "<li class='log-item'>Failed to render activity log.</li>";
        }
      }

      /**
       * Fetch status from backend and update the dashboard.
       */
      async function loadStatus() {
        try {
          const response = await fetch("/api/sync/status");
          if (!response.ok) {
            throw new Error(`Status request failed with ${response.status}`);
          }
          const data = await response.json();

          renderStatusBadge(data.status);
          totalSynced.textContent = `${data.totalSynced || 0}`;
          lastSyncedAt.textContent = data.lastSyncedAt
            ? new Date(data.lastSyncedAt).toLocaleString()
            : "Never";
          pendingErrors.textContent = `${data.pendingErrors || 0}`;
          renderActivity(data.recentActivity || []);
          refreshHint.textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
        } catch (error) {
          renderStatusBadge("error");
          refreshHint.textContent = `Dashboard fetch error: ${error.message}`;
        }
      }

      /**
       * Trigger manual force re-sync.
       */
      async function forceResync() {
        try {
          forceResyncBtn.disabled = true;
          const response = await fetch("/api/sync/force", { method: "POST" });
          if (!response.ok) {
            throw new Error(`Force re-sync failed with ${response.status}`);
          }
          await loadStatus();
        } catch (error) {
          renderStatusBadge("error");
          refreshHint.textContent = `Force re-sync error: ${error.message}`;
        } finally {
          forceResyncBtn.disabled = false;
        }
      }

      forceResyncBtn.addEventListener("click", forceResync);
      loadStatus();
      setInterval(loadStatus, 10000);
    </script>
  </body>
</html>
