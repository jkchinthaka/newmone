name: Docker Build Check

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: maintainpro

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f apps/api/Dockerfile --target production -t maintainpro-api:ci .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile --target production -t maintainpro-web:ci .

      - name: Validate compose config
        run: docker compose --env-file .env.compose-ci -f docker-compose.yml config > /tmp/compose-config.txt
