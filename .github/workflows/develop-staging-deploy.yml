name: Develop Staging Deploy

on:
  push:
    branches: ["develop"]

defaults:
  run:
    working-directory: maintainpro

jobs:
  staging-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: maintainpro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build monorepo
        run: npm run build

      - name: Build docker images
        run: |
          docker build -f apps/api/Dockerfile --target production -t maintainpro-api:staging .
          docker build -f apps/web/Dockerfile --target production -t maintainpro-web:staging .

      - name: Staging deploy placeholder
        run: |
          echo "Build completed for develop branch (sha=${GITHUB_SHA})."
          echo "Configure GitHub Environment 'staging' secrets before enabling real deploy commands."
          echo "Required operator secrets: STAGING_HOST, STAGING_USER, STAGING_SSH_KEY (or Render/Cloudflare tokens)."
