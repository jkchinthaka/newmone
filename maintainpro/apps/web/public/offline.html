<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MaintainPro Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(14, 165, 233, 0.18), transparent 36%),
          linear-gradient(180deg, #e2e8f0 0%, #f8fafc 100%);
        color: #0f172a;
      }

      main {
        width: min(92vw, 28rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.28);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.6;
        color: #334155;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.1rem;
        background: #0f172a;
        color: white;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>MaintainPro cached the shell of this app, but this page needs a network connection before it can refresh live operational data.</p>
      <p>Reconnect and try again. Queued mobile actions will continue syncing from the mobile app when connectivity returns.</p>
      <button type="button" onclick="window.location.reload()">Retry connection</button>
    </main>
  </body>
</html>
