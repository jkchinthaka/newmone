services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      DATABASE_PROVIDER: mongodb
      PRIMARY_DATABASE_URL: ${PRIMARY_DATABASE_URL:-mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/nelna?authSource=${MONGO_INITDB_DATABASE:-bileeta_db}&replicaSet=rs0}
      BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:-mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/${MONGO_INITDB_DATABASE:-bileeta_db}?authSource=${MONGO_INITDB_DATABASE:-bileeta_db}&replicaSet=rs0}
      DATABASE_URL: ${PRIMARY_DATABASE_URL:-mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/nelna?authSource=${MONGO_INITDB_DATABASE:-bileeta_db}&replicaSet=rs0}
      MONGODB_URI: ${PRIMARY_DATABASE_URL:-mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/nelna?authSource=${MONGO_INITDB_DATABASE:-bileeta_db}&replicaSet=rs0}
      PRIMARY_DATABASE_NAME: ${PRIMARY_DATABASE_NAME:-nelna}
      BACKUP_DATABASE_NAME: ${BACKUP_DATABASE_NAME:-bileeta_db}
      MONGO_DATABASE_NAME: ${PRIMARY_DATABASE_NAME:-nelna}
      MONGO_SYNC_ON_STARTUP: ${MONGO_SYNC_ON_STARTUP:-false}
      DATABASE_REPLICATION_ENABLED: ${DATABASE_REPLICATION_ENABLED:-true}
      DATABASE_REPLICATION_MODE: ${DATABASE_REPLICATION_MODE:-async_outbox}
      DATABASE_REPLICATION_RETRY_ATTEMPTS: ${DATABASE_REPLICATION_RETRY_ATTEMPTS:-5}
      DATABASE_REPLICATION_RETRY_DELAY_MS: ${DATABASE_REPLICATION_RETRY_DELAY_MS:-5000}
      DATABASE_REPLICATION_BATCH_SIZE: ${DATABASE_REPLICATION_BATCH_SIZE:-100}
      BACKUP_DATABASE_REQUIRED_FOR_READINESS: ${BACKUP_DATABASE_REQUIRED_FOR_READINESS:-false}
      BACKUP_DATABASE_REQUIRED_FOR_STRICT_MODE: ${BACKUP_DATABASE_REQUIRED_FOR_STRICT_MODE:-true}
      RAPIDAPI_GOOGLE_MAP_PLACES_KEY: ${RAPIDAPI_GOOGLE_MAP_PLACES_KEY:-}
      REDIS_URL: redis://redis:6379
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      FARM_DEFAULT_LATITUDE: ${FARM_DEFAULT_LATITUDE:-6.9271}
      FARM_DEFAULT_LONGITUDE: ${FARM_DEFAULT_LONGITUDE:-79.8612}
      WEATHER_ALERT_FROST_THRESHOLD_C: ${WEATHER_ALERT_FROST_THRESHOLD_C:-5}
      WEATHER_ALERT_RAIN_THRESHOLD_MM: ${WEATHER_ALERT_RAIN_THRESHOLD_MM:-50}
      TRACEABILITY_PUBLIC_BASE_URL: ${TRACEABILITY_PUBLIC_BASE_URL:-https://trace.nelnafarm.lk}
      RAPIDAPI_COPILOT_API_KEY: ${RAPIDAPI_COPILOT_API_KEY:-}
      RAPIDAPI_COPILOT_HOST: ${RAPIDAPI_COPILOT_HOST:-copilot5.p.rapidapi.com}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-maintainpro-files}
    command: npm run dev --workspace @maintainpro/api
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/workspace
      - maintainpro-node-modules:/workspace/node_modules
      - maintainpro-api-dist:/workspace/apps/api/dist

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api}
      NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-http://localhost:3000}
    command: npm run dev --workspace @maintainpro/web
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_started
    volumes:
      - .:/workspace
      - maintainpro-node-modules:/workspace/node_modules
      - maintainpro-web-next:/workspace/apps/web/.next

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-bileeta_db}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - maintainpro-mongo-data-dev:/data/db
      - ./infra/mongo/init-app-user.js:/docker-entrypoint-initdb.d/init-app-user.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - maintainpro-redis-data-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - maintainpro-minio-data-dev:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123}; do
        echo 'Waiting for MinIO to become ready...';
        sleep 2;
      done;
      mc mb -p local/${MINIO_BUCKET:-maintainpro-files} || true;
      exit 0;"

volumes:
  maintainpro-node-modules:
  maintainpro-api-dist:
  maintainpro-web-next:
  maintainpro-mongo-data-dev:
  maintainpro-redis-data-dev:
  maintainpro-minio-data-dev:
