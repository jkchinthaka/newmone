services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-maintainpro}:${POSTGRES_PASSWORD:-maintainpro}@postgres:5432/${POSTGRES_DB:-maintainpro}?schema=public
      REDIS_URL: redis://redis:6379
      RAPIDAPI_COPILOT_API_KEY: ${RAPIDAPI_COPILOT_API_KEY:-}
      RAPIDAPI_COPILOT_HOST: ${RAPIDAPI_COPILOT_HOST:-copilot5.p.rapidapi.com}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-maintainpro-files}
    command: npm run dev --workspace @maintainpro/api
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/workspace
      - maintainpro-node-modules:/workspace/node_modules
      - maintainpro-api-dist:/workspace/apps/api/dist

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api}
      NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-http://localhost:3000}
    command: npm run dev --workspace @maintainpro/web
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_started
    volumes:
      - .:/workspace
      - maintainpro-node-modules:/workspace/node_modules
      - maintainpro-web-next:/workspace/apps/web/.next

  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maintainpro}
      POSTGRES_USER: ${POSTGRES_USER:-maintainpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maintainpro}
    volumes:
      - maintainpro-postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maintainpro} -d ${POSTGRES_DB:-maintainpro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - maintainpro-redis-data-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - maintainpro-minio-data-dev:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123}; do
        echo 'Waiting for MinIO to become ready...';
        sleep 2;
      done;
      mc mb -p local/${MINIO_BUCKET:-maintainpro-files} || true;
      exit 0;"

volumes:
  maintainpro-node-modules:
  maintainpro-api-dist:
  maintainpro-web-next:
  maintainpro-postgres-data-dev:
  maintainpro-redis-data-dev:
  maintainpro-minio-data-dev:
