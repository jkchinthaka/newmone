services:
  api:
    build:
      context: ./apps/api
      target: dev
    container_name: maintainpro-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    container_name: maintainpro-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: maintainpro
      POSTGRES_USER: maintainpro
      POSTGRES_PASSWORD: maintainpro
    volumes:
      - maintainpro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintainpro -d maintainpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maintainpro-redis
    ports:
      - "6379:6379"
    volumes:
      - maintainpro-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./apps/api
      target: production
    container_name: maintainpro-worker
    env_file:
      - .env
    command: node dist/workers/index.js
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: maintainpro-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@maintainpro.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - maintainpro-pgadmin-data:/var/lib/pgadmin

volumes:
  maintainpro-postgres-data:
  maintainpro-redis-data:
  maintainpro-pgadmin-data:
