services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      RAPIDAPI_GOOGLE_MAP_PLACES_KEY: ${RAPIDAPI_GOOGLE_MAP_PLACES_KEY:-}
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nelna}:${MONGO_INITDB_ROOT_PASSWORD:-nelna}@mongo:27017/${MONGO_INITDB_DATABASE:-nelna}?authSource=admin
      REDIS_URL: redis://redis:6379
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      FARM_DEFAULT_LATITUDE: ${FARM_DEFAULT_LATITUDE:-6.9271}
      FARM_DEFAULT_LONGITUDE: ${FARM_DEFAULT_LONGITUDE:-79.8612}
      WEATHER_ALERT_FROST_THRESHOLD_C: ${WEATHER_ALERT_FROST_THRESHOLD_C:-5}
      WEATHER_ALERT_RAIN_THRESHOLD_MM: ${WEATHER_ALERT_RAIN_THRESHOLD_MM:-50}
      TRACEABILITY_PUBLIC_BASE_URL: ${TRACEABILITY_PUBLIC_BASE_URL:-https://trace.nelnafarm.lk}
      RAPIDAPI_COPILOT_API_KEY: ${RAPIDAPI_COPILOT_API_KEY:-}
      RAPIDAPI_COPILOT_HOST: ${RAPIDAPI_COPILOT_HOST:-copilot5.p.rapidapi.com}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-maintainpro-files}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
      NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-http://localhost}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-nelna}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-nelna}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-nelna}
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - maintainpro-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - maintainpro-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - maintainpro-minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123}; do
        echo 'Waiting for MinIO to become ready...';
        sleep 2;
      done;
      mc mb -p local/${MINIO_BUCKET:-maintainpro-files} || true;
      exit 0;"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  maintainpro-mongo-data:
  maintainpro-redis-data:
  maintainpro-minio-data:
