name: Docker Build Check

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f apps/api/Dockerfile --target production -t maintainpro-api:ci .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile --target production -t maintainpro-web:ci .

      - name: Validate compose config
        run: docker compose -f docker-compose.yml config > /tmp/compose-config.txt
