<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mongo Sync Dashboard</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --ok: #16a34a;
        --warn: #d97706;
        --error: #dc2626;
        --syncing: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
        color: var(--text);
        min-height: 100vh;
      }

      .container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 0 20px;
      }

      .title {
        margin: 0 0 6px;
        font-size: 30px;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 15px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-bottom: 20px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 8px 25px rgba(15, 23, 42, 0.05);
      }

      .label {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .value {
        font-size: 24px;
        font-weight: 700;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 12px;
      }

      .badge.live {
        color: var(--ok);
        background: rgba(22, 163, 74, 0.1);
      }

      .badge.error {
        color: var(--error);
        background: rgba(220, 38, 38, 0.1);
      }

      .badge.syncing {
        color: var(--syncing);
        background: rgba(37, 99, 235, 0.1);
      }

      .badge.idle {
        color: var(--warn);
        background: rgba(217, 119, 6, 0.12);
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: #1d4ed8;
        color: #ffffff;
      }

      .primary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .ghost {
        background: #f1f5f9;
        color: #0f172a;
      }

      .logs {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }

      .logs h2 {
        margin: 0 0 12px;
        font-size: 17px;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      li {
        padding: 10px 0;
        border-bottom: 1px dashed var(--border);
      }

      li:last-child {
        border-bottom: none;
      }

      .log-main {
        font-size: 14px;
      }

      .log-time {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      .status-line {
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 700px) {
        .value {
          font-size: 20px;
        }

        .title {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">MongoDB Real-Time Sync Dashboard</h1>
      <p class="subtitle">Frontend mode: HTML + JavaScript (auto-refresh every 10 seconds)</p>

      <div class="grid">
        <div class="card">
          <div class="label">Sync Status</div>
          <div class="value"><span id="statusBadge" class="badge idle">Idle</span></div>
        </div>
        <div class="card">
          <div class="label">Total Documents Synced</div>
          <div id="totalSynced" class="value">0</div>
        </div>
        <div class="card">
          <div class="label">Last Synced At</div>
          <div id="lastSyncedAt" class="value" style="font-size: 15px; font-weight: 600">Never</div>
        </div>
        <div class="card">
          <div class="label">Pending Errors</div>
          <div id="pendingErrors" class="value">0</div>
        </div>
      </div>

      <div class="toolbar">
        <button id="forceSyncButton" class="primary">Force Re-Sync</button>
        <button id="refreshButton" class="ghost">Refresh Now</button>
      </div>

      <div class="logs">
        <h2>Recent Sync Activity (Last 10 Events)</h2>
        <div class="status-line" id="pollStatus">Waiting for first status fetch...</div>
        <ul id="activityList"></ul>
      </div>
    </div>

    <script>
      const statusEndpoint = "/api/sync/status";
      const forceEndpoint = "/api/sync/force";
      const autoRefreshMs = 10000;

      const statusBadge = document.getElementById("statusBadge");
      const totalSyncedElement = document.getElementById("totalSynced");
      const lastSyncedElement = document.getElementById("lastSyncedAt");
      const pendingErrorsElement = document.getElementById("pendingErrors");
      const activityListElement = document.getElementById("activityList");
      const pollStatusElement = document.getElementById("pollStatus");
      const forceSyncButton = document.getElementById("forceSyncButton");
      const refreshButton = document.getElementById("refreshButton");

      /**
       * Safely converts a timestamp string to readable local text.
       * @param {string|null} timestamp - ISO timestamp.
       * @returns {string} Formatted date/time text.
       */
      function formatTimestamp(timestamp) {
        try {
          if (!timestamp) {
            return "Never";
          }

          const date = new Date(timestamp);
          if (Number.isNaN(date.getTime())) {
            return "Invalid date";
          }

          return date.toLocaleString();
        } catch (error) {
          return "Invalid date";
        }
      }

      /**
       * Maps backend status to UI badge class and label.
       * @param {string} rawStatus - Raw status text from API.
       * @returns {{label: string, className: string}} Badge state payload.
       */
      function normalizeStatus(rawStatus) {
        try {
          const status = String(rawStatus || "idle").toLowerCase();

          if (status === "live") {
            return { label: "Live", className: "live" };
          }

          if (status === "syncing") {
            return { label: "Syncing", className: "syncing" };
          }

          if (status === "error") {
            return { label: "Error", className: "error" };
          }

          return { label: "Idle", className: "idle" };
        } catch (error) {
          return { label: "Idle", className: "idle" };
        }
      }

      /**
       * Renders recent event items.
       * @param {Array} events - Recent events array.
       */
      function renderRecentEvents(events) {
        try {
          activityListElement.innerHTML = "";

          if (!Array.isArray(events) || events.length === 0) {
            const emptyItem = document.createElement("li");
            emptyItem.innerHTML = '<div class="log-main">No sync activity yet.</div>';
            activityListElement.appendChild(emptyItem);
            return;
          }

          events.slice(0, 10).forEach((event) => {
            const eventItem = document.createElement("li");
            const eventText = event?.message || "Unknown event";
            const eventTime = formatTimestamp(event?.timestamp || null);

            eventItem.innerHTML = `
              <div class="log-main">${eventText}</div>
              <div class="log-time">${eventTime}</div>
            `;

            activityListElement.appendChild(eventItem);
          });
        } catch (error) {
          activityListElement.innerHTML = "";
          const fallbackItem = document.createElement("li");
          fallbackItem.innerHTML = '<div class="log-main">Failed to render events.</div>';
          activityListElement.appendChild(fallbackItem);
        }
      }

      /**
       * Applies status payload values to dashboard widgets.
       * @param {object} payload - Status payload from API.
       */
      function renderStatus(payload) {
        try {
          const normalized = normalizeStatus(payload?.status || "idle");
          statusBadge.textContent = normalized.label;
          statusBadge.className = `badge ${normalized.className}`;

          totalSyncedElement.textContent = Number(payload?.totalSynced || 0).toLocaleString();
          pendingErrorsElement.textContent = Number(payload?.pendingErrors || 0).toLocaleString();
          lastSyncedElement.textContent = formatTimestamp(payload?.lastSyncedAt || null);

          renderRecentEvents(payload?.recentEvents || []);
          pollStatusElement.textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
        } catch (error) {
          pollStatusElement.textContent = "Failed to update dashboard state.";
        }
      }

      /**
       * Fetches sync status from backend API.
       */
      async function refreshStatus() {
        try {
          pollStatusElement.textContent = "Refreshing sync status...";

          const response = await fetch(statusEndpoint, {
            method: "GET",
            headers: {
              "Content-Type": "application/json"
            }
          });

          if (!response.ok) {
            throw new Error(`Status request failed with HTTP ${response.status}`);
          }

          const payload = await response.json();
          renderStatus(payload);
        } catch (error) {
          statusBadge.textContent = "Error";
          statusBadge.className = "badge error";
          pollStatusElement.textContent = `Status refresh failed: ${error.message}`;
        }
      }

      /**
       * Sends manual force sync request to backend.
       */
      async function triggerForceSync() {
        try {
          forceSyncButton.disabled = true;
          forceSyncButton.textContent = "Starting...";
          pollStatusElement.textContent = "Manual re-sync requested...";

          const response = await fetch(forceEndpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            }
          });

          if (!response.ok) {
            throw new Error(`Force re-sync failed with HTTP ${response.status}`);
          }

          await refreshStatus();
        } catch (error) {
          pollStatusElement.textContent = `Force re-sync failed: ${error.message}`;
          statusBadge.textContent = "Error";
          statusBadge.className = "badge error";
        } finally {
          forceSyncButton.disabled = false;
          forceSyncButton.textContent = "Force Re-Sync";
        }
      }

      /**
       * Wires UI event handlers and starts auto polling.
       */
      async function initializeDashboard() {
        try {
          forceSyncButton.addEventListener("click", async () => {
            await triggerForceSync();
          });

          refreshButton.addEventListener("click", async () => {
            await refreshStatus();
          });

          await refreshStatus();

          setInterval(async () => {
            await refreshStatus();
          }, autoRefreshMs);
        } catch (error) {
          pollStatusElement.textContent = `Dashboard initialization failed: ${error.message}`;
          statusBadge.textContent = "Error";
          statusBadge.className = "badge error";
        }
      }

      void initializeDashboard();
    </script>
  </body>
</html>
